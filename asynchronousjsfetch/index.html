<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Team Builder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="layout">

    <!-- all of the info/stuff on the left-->
    <section class="card search-card">

      <div class="image-box">
        <img id="pokeimage" alt="">
        <div id="name" class="pokemon-name">—</div>
      </div>

      <div class="search-area">
        <input id="input" type="text" placeholder="Enter name or ID">
        <button id="search">Search</button>
      </div>

      <p id="status" class="status-text"></p>

      <div class="audio-section">
        <label>Pokemon Cry</label>
        <audio id="cry" controls></audio>
      </div>

      <button id="add" disabled>Add To Team</button>

    </section>
<!-- all the stuff on the right side -->
    <section class="card team-card">

      <div class="move-section">
        <label>Select Moves</label>
        <select id="move1"></select>
        <select id="move2"></select>
        <select id="move3"></select>
        <select id="move4"></select>
      </div>

      <div class="line"></div>

      <div class="team-header">
        <h2>Your Team</h2>
        <span id="count">(0/6)</span>
      </div>

      <div id="team" class="team-list">
        <div class="empty-message">Catch Em All!</div>
      </div>

    </section>

  </main>

  <script src="js.js"></script>
</body>
</html>
